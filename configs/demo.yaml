# Demo Config — TSDF mesh viewer + interactive search
# Used by `python demo/demo.py`.
# CLI flags override values set here.

_base: base.yaml

tsdf:
  voxel_size: 0.015              # MP3D auto-overrides to 0.03
  voxel_size_mp3d: 0.03          # coarser for sparse panoramic captures
  sdf_trunc_factor: 5.0
  max_depth: 6.0
  max_faces: 1000000
  rot_thresh: 30.0               # aggressive for large custom scenes (was 10)
  trans_thresh: 0.50             # aggressive for large custom scenes (was 0.15)

retrieval:
  # Backbone: omitted here -> inherits `model` from base.yaml (SigLIP2 default).
  # To switch to Qwen3-VL-Embedding, uncomment the block below. Requires
  # scripts/install.sh step [6/6] (clones third_party/qwen3-vl-embedding).
  # Cache is keyed per-model, so switching rebuilds the index once under
  # results/features/qwen3_vl_* (SigLIP2 cache is left intact).
  # model: Qwen/Qwen3-VL-Embedding-2B
  # extractor_kwargs:
  #   instruction: "Retrieve images relevant to query."
  #   batch_size: 1                # Qwen3-VL is token-heavy; keep at 1 on 24GB
  #   max_pixels: 147456           # ~384*384 — caps visual tokens/image
  stage1_top_k: 10
  stage2_top_k: 10

vlm:
  model: Qwen/Qwen2.5-VL-3B-Instruct  # alternative: Qwen/Qwen2.5-VL-7B-Instruct

sam3:
  batch_size: 1

multi_view:
  spatial_max_views: 1           # default 1 for speed; increase for denser object clouds
  max_mask_depth: 0.0            # 0 = disabled

display:
  port: 8080
